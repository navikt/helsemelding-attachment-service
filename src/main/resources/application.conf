server {
  port = 8080
  // time before shutdown is initiated
  preWait = "5s"
}

gcs {
  bucketName = "helsemelding-attachments"
}

azureAuth {
  issuer = "AZURE_AD"
  azureWellKnownUrl = "${AZURE_APP_WELL_KNOWN_URL:-http://localhost:3344/AZURE_AD/.well-known/openid-configuration}"
  acceptedAudience = "${AZURE_APP_CLIENT_ID:-api://dev-gcp.helsemelding.attachment-service}"
}
