server {
  port = 8080
  // time before shutdown is initiated
  preWait = "5s"
}

gcs {
  bucketName = "helsemelding-attachments"
}

azureAuth {
  issuer = "AZURE_AD"
  discoveryUrl = "${AZURE_APP_WELL_KNOWN_URL:-http://localhost:3344/AZURE_AD/.well-known/openid-configuration}"
  acceptedAudience = "${AZURE_APP_CLIENT_ID:-api://dev-gcp.helsemelding.attachment-service}"
}

security {
  clientsWithWriteAccess = [
    "a284f235-78ac-4df9-8f1e-441783dbacca"
  ]
}
