name: "Publish attachment-client library"
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  build:
    name: "build-and-publish"
    runs-on: "ubuntu-24.04"
    permissions: 
        packages: write
        repository-projects: write
        contents: write
    steps:
    - uses: "actions/checkout@v7"
    - uses: "actions/setup-java@v5"
      with:
        "java-version": "21"
        "distribution": "temurin"
    - name: Cache Gradle
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/wrapper
          ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: "Build and tests attachment-model"
      run: ./gradlew :attachment-model:test  :attachment-model:build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: x-access-token
    - name: "Build and tests attachment-client"
      run: ./gradlew :attachment-client:test  :attachment-client:build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: x-access-token

    - name: "Show attachment-model version"
      run: |
        VERSION=$(grep 'version =' attachment-model/build.gradle.kts | awk -F'"' '{print $2}')
        echo "Publishing attachment-model version: $VERSION"
    - name: "Show attachment-client version"
      run: |
        VERSION=$(grep 'version =' attachment-client/build.gradle.kts | awk -F'"' '{print $2}')
        echo "Publishing attachment-client version: $VERSION"   

    - name: "Publish attachment-model to GitHub Packages"
      run: ./gradlew --stacktrace :attachment-model:publish
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: x-access-token
    - name: "Publish attachment-client to GitHub Packages"
      run: ./gradlew --stacktrace :attachment-client:publish
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: x-access-token
