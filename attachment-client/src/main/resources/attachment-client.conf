httpClient {
  connectionTimeout = "${HTTP_CLIENT_TIMEOUT_SECONDS:-3}s"
}

httpTokenClient {
  connectionTimeout = "${TOKEN_CLIENT_TIMEOUT_SECONDS:-2}s"
}

attachmentService {
  url = "${ATTACHMENT_SERVICE_URL:-http://attachment-service}"
  scope = "${ATTACHMENT_SERVICE_SCOPE:-api://dev-gcp.helsemelding.attachment-service/.default}"
}

azureAuth {
  grantType = "client_credentials"
  tokenEndpoint = "${AZURE_OPENID_CONFIG_TOKEN_ENDPOINT:-http://localhost:3344/AZURE_AD/token}"
  appClientId = "${AZURE_APP_CLIENT_ID:-test-aud}"
  appClientSecret = "${AZURE_APP_CLIENT_SECRET:-test-secret}"
}
